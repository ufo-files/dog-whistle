<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dog Whistle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main aria-labelledby="app-title">
    <div class="visual-stage" id="visual-stage">
      <canvas id="waveform" aria-label="Layered signal waveform"></canvas>
      <canvas id="sphere" aria-label="3D signal orb"></canvas>
      <div class="play-overlay" id="play-overlay">
        <button id="play" class="play-button" type="button">Play</button>
      </div>
    </div>

    <header class="global-header">
      <section class="brand" aria-label="Signal status">
        <a class="owner-label" href="https://github.com/ufo-files">UFO Files</a>
        <h1 id="app-title">
          <span class="app-switcher">
            <span class="app-switcher-text">Dog Whistle</span>
            <select id="app-switcher" aria-label="Application">
              <option value="https://ufo-files.github.io/dog-whistle/" selected>Dog Whistle</option>
              <option value="https://ufo-files.github.io/relationship-graph/">Relationship Graph</option>
              <option value="https://ufo-files.github.io/meditation/">Meditation</option>
            </select>
          </span>
        </h1>
        <div class="meta sr-only" id="status" role="status" aria-live="polite">Idle / output muted</div>
      </section>

      <label class="field header-volume" for="volume">
        <span>Volume</span>
        <input id="volume" type="range" min="0" max="0.6" value="0.12" step="0.001">
      </label>
      <button id="controls-menu-toggle" class="menu-button" type="button" aria-label="Open controls" aria-controls="controls-panel" aria-expanded="false">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </header>

    <aside class="controls-panel" id="controls-panel" aria-label="Dog Whistle controls">
      <form class="controls" id="controls" aria-label="Audio controls">
        <button id="pulse" type="button" aria-pressed="false">Pulse</button>
        <label class="field view-field" for="visualization">
          <span>View</span>
          <select id="visualization">
            <option value="sphere">Orb</option>
            <option value="circle">Circle</option>
            <option value="waveform">Waveform</option>
          </select>
        </label>
        <label class="toggle" for="binaural">
          <span>Binaural mode</span>
          <input id="binaural" type="checkbox">
          <i aria-hidden="true"></i>
        </label>
      </form>
      <div class="site-motto">
        <span>Fides soli veritati</span>
        <span aria-hidden="true">|</span>
        <a href="https://tips.hushline.app/to/ufo-files">Anonymous Tips</a>
      </div>
    </aside>

    <button id="tones-toggle" class="tones-toggle" type="button" aria-label="Open tones" aria-controls="tones-panel" aria-expanded="false">Tones</button>

    <section class="readout" id="tones-panel" aria-label="Signal layers">
      <div class="layer-control" data-layer-control="carrier">
        <div class="layer-frequency">
          <input id="frequency-carrier" class="layer-frequency-input" type="number" data-layer="carrier" min="20" max="1000" value="100" step="0.01" aria-label="Carrier frequency">
          <em>Hz</em>
        </div>
        <b>7.83 Hz L/R beat</b>
        <label class="layer-switch" aria-label="Toggle 100 Hz carrier">
          <input class="layer-toggle" type="checkbox" data-layer="carrier" checked>
          <i aria-hidden="true"></i>
        </label>
      </div>
      <div class="layer-control" data-layer-control="harmonic">
        <div class="layer-frequency">
          <input id="frequency-harmonic" class="layer-frequency-input" type="number" data-layer="harmonic" min="20" max="20000" value="528" step="0.01" aria-label="Harmonic frequency">
          <em>Hz</em>
        </div>
        <b>Harmonic</b>
        <label class="layer-switch" aria-label="Toggle 528 Hz harmonic">
          <input class="layer-toggle" type="checkbox" data-layer="harmonic" checked>
          <i aria-hidden="true"></i>
        </label>
      </div>
      <div class="layer-control" data-layer-control="ping">
        <div class="layer-frequency">
          <input id="frequency-ping" class="layer-frequency-input" type="number" data-layer="ping" min="1000" max="20000" value="17000" step="1" aria-label="Ping frequency">
          <em>Hz</em>
        </div>
        <b>3 sec ping</b>
        <label class="layer-switch" aria-label="Toggle 17 kHz ping">
          <input class="layer-toggle" type="checkbox" data-layer="ping" checked>
          <i aria-hidden="true"></i>
        </label>
      </div>
      <div class="layer-control" data-layer-control="chirp">
        <div class="layer-frequency">
          <input id="frequency-chirp" class="layer-frequency-input" type="number" data-layer="chirp" min="100" max="12000" value="2500" step="1" aria-label="Chirp frequency">
          <em>Hz</em>
        </div>
        <b>10 sec chirp</b>
        <label class="layer-switch" aria-label="Toggle 2.5 kHz chirp">
          <input class="layer-toggle" type="checkbox" data-layer="chirp" checked>
          <i aria-hidden="true"></i>
        </label>
      </div>
      <div class="layer-control" data-layer-control="pad">
        <div class="layer-frequency">
          <input id="frequency-pad" class="layer-frequency-input" type="number" data-layer="pad" min="20" max="20000" value="432" step="0.01" aria-label="Pad frequency">
          <em>Hz</em>
        </div>
        <b>Pad</b>
        <label class="layer-switch" aria-label="Toggle 432 Hz pad">
          <input class="layer-toggle" type="checkbox" data-layer="pad" checked>
          <i aria-hidden="true"></i>
        </label>
      </div>
      <div class="layer-control" data-layer-control="breath">
        <div class="layer-frequency">
          <input id="frequency-breath" class="layer-frequency-input" type="number" data-layer="breath" min="4" max="40" value="16" step="0.1" aria-label="Breath cycle length">
          <em>sec</em>
        </div>
        <b>Breath cycle</b>
        <label class="layer-switch" aria-label="Toggle breath layer">
          <input class="layer-toggle" type="checkbox" data-layer="breath" checked>
          <i aria-hidden="true"></i>
        </label>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
